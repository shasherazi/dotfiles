[colors]
#darkmatter
background = #dd0D0000
#bogart
foreground = #d5c7ac
#camouflage
accent1    = #0e3523
#blackenedBrown
accent2    = #402401
#red
accent3    = #801817
#weldonBlue
accent4 = #869aa4
#italianRoast
dark       = #26130D

[bar/example]
width = 100%
height = 24pt
background = ${colors.background}
foreground = ${colors.foreground}
padding = 1
module-margin = 1
font-0 = JetBrainsMono Nerd Font:size=13;4
modules-left = workspaces player-mpris-tail 
modules-right = openweathermap-simple pulseaudio battery wlan eth
modules-center = date
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
wm-restack = bspwm

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "ÔÄ® "
format-volume = <label-volume>
label-volume = %percentage%%
label-muted = ÔĪĚ
format-volume-foreground = ${colors.foreground}
label-muted-foreground = ${colors.accent2}
label-muted-background = ${colors.accent3}
label-muted-padding = 2

[module/battery]
type = internal/battery
full-at = 99
low-at = 10
battery = BAT0
adapter = ADP1
interval = 1
format-charging = <animation-charging> <label-charging>
format-charging-foreground = ${colors.foreground}
format-discharging = <ramp-capacity><label-discharging>
format-discharging-foreground = ${colors.foreground}
label-charging = %percentage%%
label-charging-foreground = ${colors.accent4}
label-discharging = %percentage%%
label-full = ÔĖĄ
label-full-foreground = ${colors.accent1}
label-low = ÔĖć
ramp-capacity-0 = ÔēĻ
ramp-capacity-0-background = ${colors.accent3}
ramp-capacity-1 = ÔēĽ
ramp-capacity-1-background = ${colors.accent3}
ramp-capacity-2 = ÔēĹ
ramp-capacity-3 = ÔēŅ
ramp-capacity-4 = Ôēł
bar-capacity-width = 10
animation-charging-0 = ÔĖÖ
animation-charging-1 = ÔĖÜ
animation-charging-2 = ÔĖá
animation-charging-3 = ÔĖą
animation-charging-4 = ÔĖČ
animation-charging-foreground = ${colors.accent4}
animation-charging-framerate = 750

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = Ôáę %essid%
label-disconnected = Ô™© Ôāú
label-connected-foreground = ${colors.foreground}
label-disconnected-foreground = ${colors.dark}

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#fafdff}ÔúÄ%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1
time = %H:%M
date = %a, %b %d% 
label = %date% | %time%
label-foreground = ${colors.foreground}

[module/workspaces]
type = internal/bspwm
enable-scroll = false
ws-icon-0 = term;ÓĮä
ws-icon-1 = files;ÔĄĒ
ws-icon-2 = web;Ô™ě
ws-icon-3 = code;ÓęĄ
ws-icon-4 = music;ÔÄĀ
ws-icon-5 = discord;Ô≠ģ
ws-icon-6 = slack;ÔÜė
ws-icon-7 = zoom;ÔÄĹ
ws-icon-8 = mail;Ô°č
ws-icon-9 = misc;Ó≠£
format = <label-state>
label-focused = ÔĄĎ
label-focused-padding-right = 1
label-focused-foreground = ${colors.accent4}
label-occupied = ÔĄĎ
label-occupied-padding-right = 1
label-occupied-foreground = ${colors.accent3}
label-empty = ÔĄĎ
label-empty-foreground = ${colors.dark}
label-empty-padding-right = 1

[module/player-mpris-tail]
type = custom/script
exec = ~/.config/polybar/player-mpris-tail/player-mpris-tail.py -f '{icon} {:t15:{title}:}'
format-foreground = ${colors.foreground}
click-left = ~/.config/polybar/player-mpris-tail/player-mpris-tail.py play-pause &
tail = true

[module/openweathermap-simple]
type = custom/script
exec = ~/.config/polybar/openweathermap-simple/openweathermap-simple.sh
interval = 600
label-foreground = ${colors.foreground}
