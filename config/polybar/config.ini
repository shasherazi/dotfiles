[colors]
background = #16161e
foreground = #a9b1d6
accent1    = #414868
accent2    = #f7768e

[bar/bspwm]
width = 100%
height = 24pt
background = ${colors.background}
foreground = ${colors.foreground}
padding = 1
module-margin = 1
font-0 = JetBrainsMono NF:size=13;4
font-1 = Noto Emoji:scale=10:antialias=false;4
modules-left = workspacesbspwm
modules-right = cpu memory pulseaudio battery
modules-center = date
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
tray-position = right
wm-restack = bspwm

[bar/i3]
inherit = bar/bspwm
modules-left = workspacesi3
wm-restack = generic

[settings]
format-margin-left = 1

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "’Ć© "
format-volume = <label-volume>
label-volume = %percentage%%
label-muted = ’▒Ø
format-volume-foreground = ${colors.foreground}
label-muted-foreground = ${colors.accent1}
label-muted-background = ${colors.accent2}
label-muted-padding = 2

[module/battery]
type = internal/battery
full-at = 99
low-at = 30
battery = BAT0
adapter = ADP1
interval = 1
format-charging = <animation-charging> <label-charging>
format-charging-foreground = ${colors.foreground}
format-discharging = <ramp-capacity><label-discharging>
format-discharging-foreground = ${colors.foreground}
label-charging = %percentage%%
label-discharging = %percentage%%
label-full = ’¢ä
label-full-foreground = ${colors.accent1}
label-low = ’¢Ź
ramp-capacity-0 = ’Ģ╣
ramp-capacity-0-foreground = ${colors.accent2}
ramp-capacity-1 = ’Ģ╗
ramp-capacity-1-foreground = ${colors.accent2}
ramp-capacity-2 = ’ĢĮ
ramp-capacity-3 = ’Ģ┐
ramp-capacity-4 = ’ĢĖ
bar-capacity-width = 10
animation-charging-0 = ’¢ģ
animation-charging-1 = ’¢å
animation-charging-2 = ’¢ć
animation-charging-3 = ’¢ł
animation-charging-4 = ’¢ē
animation-charging-framerate = 750

[module/cpu]
type = internal/cpu
warn-percentage = 75
format = <label>
label = cpu %percentage:2%%
format-warn = <label-warn>
label-warn = cpu %percentage%%
label-warn-foreground = ${colors.accent2}
interval = 3

[module/memory]
type = internal/memory
warn-percentage = 75
format = <label>
label = ram %percentage_used%%
format-warn = <label-warn>
label-warn = ram %percentage_used%%
label-warn-foreground = ${colors.accent2}


[module/date]
type = internal/date
interval = 1
time = %H:%M
date = %a, %b %d% 
label = %date% | %time%
label-foreground = ${colors.foreground}
label-background = ${colors.accent1}
label-padding = 2

[module/workspacesbspwm]
type = internal/bspwm
enable-scroll = false
ws-icon-0 = term;Ņ»Ŗ
ws-icon-1 = files;’äö
ws-icon-2 = web;’¬×
ws-icon-3 = code;Ņ½ä
ws-icon-4 = music;’Ćü
ws-icon-5 = discord;’Ł«
ws-icon-6 = slack;’åś
ws-icon-7 = zoom;’ĆĮ
ws-icon-8 = mail;’Īŗ
ws-icon-9 = misc;ŅŁŻ
format = <label-state>
label-focused = %name%
label-focused-padding = 1
label-focused-foreground = ${colors.accent2}
label-occupied = %name%
label-occupied-padding = 1
label-empty = 
label-empty-foreground = ${colors.accent1}
label-empty-padding-right = 1

[module/workspacesi3]
type = internal/i3
label-focused-foreground = ${colors.accent2}

